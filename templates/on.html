<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libra Chat - Neuro-Symbolic Interface</title>
    <script src="{{ url_for('static', filename='vendor/tailwindcss.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/lucide.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/fonts.css') }}">
</head>
<body class="antialiased selection:bg-white selection:text-black">

    <canvas id="space-canvas"></canvas>
    <div class="vignette"></div>

    <div class="flex h-screen w-full relative z-10">
        
        <!-- Left Sidebar -->
        <aside class="w-64 flex-shrink-0 hidden md:flex flex-col glass-panel border-r-0 border-l-0 border-t-0 border-b-0 border-r border-white/10 relative">
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 rounded-sm bg-white/5 border border-white/10 flex items-center justify-center">
                    <i data-lucide="omega" class="w-4 h-4 text-white"></i>
                </div>
                <h1 class="font-display font-bold text-lg tracking-widest text-white uppercase">Libra</h1>
            </div>

            <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
                <button class="w-full flex items-center gap-3 px-3 py-2 text-xs font-medium text-gray-300 bg-white/5 rounded hover:bg-white/10 transition-colors border border-white/5 mb-2 group uppercase tracking-wider">
                    <i data-lucide="plus" class="w-3 h-3 text-gray-400 group-hover:text-white transition-all"></i>
                    New Session
                </button>
                <div class="text-[10px] font-bold text-gray-600 uppercase tracking-widest px-3 mb-2 mt-2">Logic Core</div>
                <button class="w-full flex items-center gap-3 px-3 py-2 text-xs text-gray-500 hover:text-white hover:bg-white/5 rounded transition-colors text-left truncate group font-mono">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-700 group-hover:bg-white transition-colors"></span>
                    <span class="truncate">inference_trace_04.pl</span>
                </button>
            </nav>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col min-w-0 relative">
            <header class="md:hidden h-14 glass-panel border-b border-white/10 flex items-center px-4 justify-between shrink-0">
                <div class="flex items-center gap-2">
                    <i data-lucide="omega" class="w-4 h-4 text-white"></i>
                    <span class="font-display font-bold text-lg text-white">LIBRA</span>
                </div>
            </header>

            <div class="hidden md:flex h-6 w-full shrink-0"></div>

            <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 md:px-32 scroll-smooth space-y-10">
                
                {% if queries %}
                    {% for i in range(queries|length) %}
                        <!-- 1. Always Render User Query -->
                        <div class="w-full flex justify-end msg-enter">
                            <div class="flex gap-4 max-w-3xl flex-row-reverse">
                                <div class="w-6 h-6 mt-1 flex items-center justify-center opacity-70">
                                    <div class="w-2 h-2 bg-white rounded-full"></div>
                                </div>
                                <div class="bg-white/10 border border-white/10 text-white px-4 py-2 text-sm font-light tracking-wide rounded-sm">
                                    {{ queries[i] }}
                                </div>
                            </div>
                        </div>

                        <!-- 2. Render AI Response (STATIC) for all EXCEPT the last one -->
                        {% if i < (queries|length - 1) %}
                        <div class="w-full flex justify-start msg-enter">
                            <div class="flex gap-4 max-w-3xl flex-row">
                                <div class="w-6 h-6 mt-2 flex items-center justify-center opacity-70">
                                    <i data-lucide="omega" class="w-4 h-4 text-white"></i>
                                </div>
                                <div class="text-gray-300 pr-4 py-2 text-sm font-light leading-relaxed w-full">
                                    {{ responses[i] | safe }}
                                </div>
                            </div>
                        </div>
                        {% endif %}
                        
                        <!-- 3. The LAST response is skipped here. It is handled by the Script at the bottom -->
                    {% endfor %}
                {% else %}
                    <!-- Welcome State -->
                    <div class="flex flex-col items-center justify-center h-full text-center space-y-6 opacity-80" id="empty-state">
                        <div class="relative">
                            <div class="absolute inset-0 bg-white blur-xl opacity-10 rounded-full"></div>
                            <i data-lucide="omega" class="w-12 h-12 text-white relative z-10"></i>
                        </div>
                        <div class="space-y-1">
                            <h2 class="text-2xl font-display text-white tracking-widest uppercase">Libra Interface</h2>
                            <p class="text-gray-500 font-mono text-[10px] tracking-[0.2em] uppercase">Symbolic Reasoning Engine Active</p>
                        </div>
                    </div>
                {% endif %}
            
            </div>

            <!-- Input Area -->
            <div class="p-4 md:p-8 pb-8 relative">
                <div class="max-w-3xl mx-auto relative group">
                    <form action="/" method="POST" class="relative glass-input rounded-3xl p-2 pl-4 flex flex-col gap-2 shadow-2xl transition-all duration-300" id="input-container">
                        <!-- File Upload Preview -->
                        <div id="file-preview" class="hidden px-2 py-1 bg-white/5 border-b border-white/5 mb-1">
                            <div class="flex justify-between items-center text-xs text-white font-mono">
                                <span class="flex items-center gap-2"><i data-lucide="file" class="w-3 h-3"></i> <span id="filename">data.csv</span></span>
                                <button type="button" onclick="clearFile()" class="hover:text-red-400">REMOVE</button>
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <button type="button" id="upload-btn" class="p-2 text-gray-500 hover:text-white transition-colors rounded-full hover:bg-white/10 shrink-0">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </button>
                            
                            <!-- Logic Menu -->
                            <div class="relative group">
                                <button type="button" id="logic-toggle-btn" class="p-2 text-gray-500 hover:text-white transition-colors rounded-full hover:bg-white/10 shrink-0 flex items-center justify-center">
                                    <i data-lucide="cpu" class="w-5 h-5" id="current-mode-icon"></i>
                                </button>
                                <div id="logic-menu" class="hidden absolute bottom-full left-0 mb-3 w-64 glass-panel rounded-xl border border-white/10 shadow-2xl overflow-hidden backdrop-blur-xl z-50 transform origin-bottom-left transition-all duration-200 p-1">
                                    <div class="flex items-center justify-between px-3 py-3 border-b border-white/5">
                                        <div class="flex items-center gap-2">
                                            <i data-lucide="brain-circuit" class="w-4 h-4 text-gray-300"></i>
                                            <span class="text-xs font-semibold text-gray-200">Inference Engine</span>
                                        </div>
                                        <button type="button" id="master-switch" class="w-9 h-5 rounded-full bg-white/10 relative transition-colors duration-300 focus:outline-none" onclick="toggleInferenceEngine()">
                                            <div id="switch-thumb" class="w-3 h-3 bg-white rounded-full absolute top-1 left-1 transition-transform duration-300 shadow-sm"></div>
                                        </button>
                                    </div>
                                    <div id="rag-options" class="hidden p-1 transition-all duration-300 origin-top">
                                        <div class="px-3 py-1.5 text-[10px] font-bold text-gray-500 uppercase tracking-wider">Context Retrieval</div>
                                        <button type="button" class="w-full flex items-center gap-3 px-3 py-2 text-xs font-medium text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-colors group/item" onclick="selectRagMode('none')">
                                            <i data-lucide="ban" class="w-4 h-4 text-gray-500 group-hover/item:text-white transition-colors"></i>
                                            <span>No RAG</span>
                                            <i data-lucide="check" class="w-3.5 h-3.5 ml-auto text-white opacity-0 check-icon" id="check-none"></i>
                                        </button>
                                        <button type="button" class="w-full flex items-center gap-3 px-3 py-2 text-xs font-medium text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-colors group/item" onclick="selectRagMode('rag')">
                                            <i data-lucide="library" class="w-4 h-4 text-gray-500 group-hover/item:text-white transition-colors"></i>
                                            <span>Standard RAG</span>
                                            <i data-lucide="check" class="w-3.5 h-3.5 ml-auto text-white opacity-0 check-icon" id="check-rag"></i>
                                        </button>
                                        <button type="button" class="w-full flex items-center gap-3 px-3 py-2 text-xs font-medium text-gray-400 hover:bg-white/10 hover:text-white rounded-lg transition-colors group/item" onclick="selectRagMode('graphrag')">
                                            <i data-lucide="share-2" class="w-4 h-4 text-gray-500 group-hover/item:text-white transition-colors"></i>
                                            <span>GraphRAG</span>
                                            <i data-lucide="check" class="w-3.5 h-3.5 ml-auto text-white opacity-0 check-icon" id="check-graphrag"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <textarea name="query" id="user-input" rows="1" class="flex-1 bg-transparent border-0 text-white placeholder-gray-500 focus:ring-0 resize-none py-3 max-h-32 font-light text-sm tracking-wide" placeholder="Ask Libra anything..." required></textarea>
                            
                            <button type="submit" id="action-btn" class="p-2 mr-1 rounded-full text-white transition-all duration-300 hover:bg-white/10 flex items-center justify-center w-10 h-10 shrink-0">
                                <i data-lucide="mic" class="w-5 h-5 absolute icon-transition" id="icon-mic"></i>
                                <i data-lucide="send-horizontal" class="w-5 h-5 absolute icon-transition opacity-0 scale-75" id="icon-send"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <input type="file" id="file-input" class="hidden">
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <!-- PYTHON -> JS HANDOFF -->
    <script>
        // Check if there is a new response to render
        {% if responses %}
            // Pass the LAST response from Python to JS safely
            const lastAiResponse = {{ responses[-1] | tojson | safe }};
            
            window.addEventListener('DOMContentLoaded', () => {
                if(typeof triggerResponseAnimation === 'function') {
                    // Trigger the typing animation for the newest message
                    triggerResponseAnimation(lastAiResponse);
                }
            });
        {% endif %}
    </script>
</body>
</html>
